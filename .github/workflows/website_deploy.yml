name: Website Deploy

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "firebase.json"
      - "assets/munros.csv"
      - ".github/workflows/website_deploy.yml"

jobs:
  deploy:
    name: Build and Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: npm run build

      - name: Decode Firebase service account
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy to Firebase Hosting (prod)
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
